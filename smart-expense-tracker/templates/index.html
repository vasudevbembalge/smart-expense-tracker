<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Smart Expense Tracker</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body>
    <div class="container">
        <header>
            <h1>💰 Smart Expense Tracker</h1>
            <p class="subtitle">DevOps Mini Project</p>
        </header>
        <div class="balance-section">
            <div class="balance-card income"><h3>Total Income</h3><p class="amount" id="total-income">₹0.00</p></div>
            <div class="balance-card expense"><h3>Total Expense</h3><p class="amount" id="total-expense">₹0.00</p></div>
            <div class="balance-card remaining"><h3>Remaining Balance</h3><p class="amount" id="remaining">₹0.00</p></div>
        </div>
        <div class="form-section">
            <h2>Add Transaction</h2>
            <form id="transaction-form">
                <div class="form-group"><label>Type:</label><select id="type" required><option value="income">Income</option><option value="expense">Expense</option></select></div>
                <div class="form-group"><label>Description:</label><input type="text" id="description" placeholder="e.g., Salary, Food, Transport" required></div>
                <div class="form-group"><label>Amount (₹):</label><input type="number" id="amount" placeholder="0.00" step="0.01" min="0" required></div>
                <button type="submit" class="btn-submit">Add Transaction</button>
            </form>
        </div>
        <div class="transactions-section">
            <h2>Recent Transactions</h2>
            <div id="transactions-list"><p class="no-data">No transactions yet. Add one above!</p></div>
        </div>
    </div>
    <script src="{{ url_for('static', filename='js/app.js') }}"></script>
</body>
</html>
